services:
  db:
    container_name: octagon-db
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: octagon_oracle
      POSTGRES_USER: octagon
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U octagon"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    container_name: octagon-backend
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://octagon:${POSTGRES_PASSWORD}@db:5432/octagon_oracle
      GROQ_API_KEY: ${GROQ_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
    volumes:
      - ./backend:/app

  website:
    container_name: octagon-website
    build: ./website
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://octagon:${POSTGRES_PASSWORD}@db:5432/octagon_oracle

volumes:
  pgdata:
